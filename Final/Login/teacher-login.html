<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Authentication - DeadlineRX</title>
  <style>
    :root {
      --primary: #6366f1;
      --text-main: #334155;
      --bg: #f8fafc;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-card {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h2 { margin: 0; font-weight: 600; font-size: 1.5rem; }
    .header p { color: #64748b; font-size: 0.9rem; margin-top: 0.5rem; }
    
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    input, select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn {
      width: 100%;
      padding: 0.8rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
    .footer-link a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="header">
      <h2>Faculty Login</h2>
      <p>Manage assignments and test schedules</p>
    </div>

    <form action="teacher-login-process.php" method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Eg. Gaurang Patkar" required>
      </div>

      <div class="form-group">
        <label>Institutional Email Address</label>
        <input type="email" name="email" placeholder="name@dbcegoa.ac.in" required>
      </div>

      <div class="form-group">
        <label>Department</label>
        <select name="department" required>
          <option value="">Select Department</option>
          <option value="1">Computer Department</option>
          <option value="2">Civil Department</option>
          <option value="3">Mechanical Department</option>
          <option value="4">Electronics and Computer Science</option>
          <option value="5">Science and Humanities</option>                  
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn">Confirm Identity & Login</button>
    </form>

    <div class="footer-link">
      <a href="../index.html">← Back to Portal Selection</a>
    </div>
  </div>
<script>
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const btn = e.target.querySelector('button');
    const originalText = btn.innerText;
    
    // UI Feedback
    btn.innerText = "Verifying...";
    btn.disabled = true;

    const formData = new FormData(e.target);
    
// ... inside your submit event listener ...
try {
    // Change this line:
const response = await fetch('teacher-login-process.php', { // Removed '../'
    method: 'POST',
    body: formData
});

    const text = await response.text();
    
    // This helps you debug if PHP sends an error instead of JSON
    let result;
    try {
        result = JSON.parse(text);
    } catch (e) {
        console.error("Server sent non-JSON response:", text);
        alert("Server Error: Received invalid response from login script.");
        return;
    }

    if (result.success) {
        // Redirect to dashboard
        window.location.href = '../teacher-dashboard.php';
    } else {
        // Show error message from PHP
        alert(result.message || "Login failed");
        btn.innerText = originalText;
        btn.disabled = false;
    }
} catch (error) {
    console.error('Fetch Error:', error);
    alert("An error occurred during login. Please try again.");
    btn.innerText = originalText;
    btn.disabled = false;
}
});
</script>
</body>

</html>
