<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Authentication - DeadlineRX</title>
  <style>
    :root { --primary: #6366f1; --text-main: #334155; --bg: #f8fafc; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-card { background: #ffffff; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h2 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    .header p { color: #64748b; font-size: 0.9rem; margin-top: 0.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    input, select { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
    .btn { width: 100%; padding: 0.8rem; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
    .footer-link a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="header">
      <h2>Student Login</h2>
      <p>Access your assignments and deadlines</p>
    </div>

    <form action="student-login-process.php" method="POST">
      <div class="form-group">
        <label>Institutional Email Address</label>
        <input type="email" name="email" placeholder="rollnumber@dbcegoa.ac.in" required>
      </div>

      <div class="form-group">
        <label>Department of Studies</label>
        <select name="department" id="department" onchange="updateClasses()" required>
          <option value="">Select Department</option>
          <option value="Civil">Civil Department</option>
          <option value="Computer">Computer Department</option>          
          <option value="Mechanical">Mechanical Department</option>
          <option value="ECS">Electronics and Computer Science Department</option>
        </select>
      </div>

      <div class="form-group">
        <label>Class / Division</label>
        <select name="class" id="class" required>
          <option value="">Select Department First</option>
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn">Access Dashboard</button>
    </form>

    <div class="footer-link">
      <a href="../index.html">← Back to Portal Selection</a>
    </div>
  </div>

  <script>
    function updateClasses() {
      const deptSelect = document.getElementById('department');
      const classSelect = document.getElementById('class');
      const selectedDept = deptSelect.value;

      // Clear existing options
      classSelect.innerHTML = '<option value="">Select Class</option>';

      if (selectedDept === "Computer") {
        // Computer Logic: 2 classes for FE/SE, 1 for others
        const computerClasses = [
          { val: "FE COMP 1", text: "FE Computer - 1" },
          { val: "FE COMP 2", text: "FE Computer - 2" },
          { val: "SE COMP 1", text: "SE Computer - 1" },
          { val: "SE COMP 2", text: "SE Computer - 2" },
          { val: "TE COMP 1", text: "TE Computer - 1" },
          { val: "TE COMP 2", text: "TE Computer - 1" },
          { val: "BE COMP", text: "BE Computer" }
        ];
        addOptions(classSelect, computerClasses);
      } 
      else if (selectedDept !== "") {
        // All other departments: 1 class per year
        const genericClasses = [
          { val: "FE-" + selectedDept, text: "FE " + selectedDept },
          { val: "SE-" + selectedDept, text: "SE " + selectedDept },
          { val: "TE-" + selectedDept, text: "TE " + selectedDept },
          { val: "BE-" + selectedDept, text: "BE " + selectedDept }
        ];
        addOptions(classSelect, genericClasses);
      }
    }

    function addOptions(selectElement, optionsArray) {
      optionsArray.forEach(option => {
        const opt = document.createElement('option');
        opt.value = option.val;
        opt.text = option.text;
        selectElement.add(opt);
      });
    }
  </script>

</body>
</html>
